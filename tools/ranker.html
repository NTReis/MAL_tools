<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAL Anime Ranker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #ffb74d;
      letter-spacing: 1px;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 24px;
      font-size: 0.9rem;
      text-align: center;
    }

    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 720px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      margin-bottom: 20px;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.82rem;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f3460;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    input[type="text"]:focus, input[type="number"]:focus { border-color: #ffb74d; }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #ffb74d;
    }

    .slider-val {
      min-width: 56px;
      text-align: right;
      font-size: 0.95rem;
      color: #ffb74d;
      font-weight: bold;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #ffb74d, #f57c00);
      color: #1a1a2e;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: 1px solid #555;
      color: #aaa;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); opacity: 1; }

    .row {
      display: flex;
      gap: 12px;
    }

    .filter-note {
      font-size: 0.78rem;
      color: #666;
      margin-top: 4px;
    }

    /* Match-up screen */
    .match-header {
      text-align: center;
      margin-bottom: 18px;
    }
    .round-label {
      color: #ffb74d;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .match-progress {
      color: #aaa;
      font-size: 0.85rem;
      margin-top: 4px;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #0f3460;
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffb74d, #f57c00);
      transition: width 0.3s ease;
    }

    .versus {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .fighter {
      background: #0f3460;
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
      border: 2px solid transparent;
      text-align: center;
      display: flex;
      flex-direction: column;
    }
    .fighter:hover {
      border-color: #ffb74d;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,183,77,0.2);
    }

    .fighter img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
      background: #0d1535;
    }

    .fighter-title {
      font-size: 0.95rem;
      font-weight: bold;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .fighter-meta {
      font-size: 0.78rem;
      color: #aaa;
    }

    .vs {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: #ffb74d;
      font-weight: bold;
      letter-spacing: 2px;
    }

    @media (max-width: 600px) {
      .versus {
        grid-template-columns: 1fr;
      }
      .vs {
        padding: 6px 0;
      }
    }

    /* Standings */
    .standings {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .stand-row {
      display: grid;
      grid-template-columns: 36px 60px 1fr auto;
      gap: 12px;
      align-items: center;
      background: #0f3460;
      padding: 10px 14px;
      border-radius: 10px;
    }
    .stand-rank {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffb74d;
      text-align: center;
    }
    .stand-row.top1 { background: linear-gradient(90deg, #b8860b, #0f3460); }
    .stand-row.top2 { background: linear-gradient(90deg, #888, #0f3460); }
    .stand-row.top3 { background: linear-gradient(90deg, #cd7f32, #0f3460); }
    .stand-img {
      width: 60px;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 4px;
      background: #0d1535;
    }
    .stand-info {
      min-width: 0;
    }
    .stand-title {
      font-size: 0.95rem;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stand-meta {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 2px;
    }
    .stand-record {
      font-size: 0.85rem;
      color: #ffb74d;
      font-weight: bold;
      text-align: right;
    }

    .spinner {
      display: none;
      text-align: center;
      padding: 14px;
      color: #aaa;
      font-size: 0.9rem;
    }

    #error-msg {
      display: none;
      background: #3e1313;
      color: #ff8a80;
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 0.9rem;
      max-width: 720px;
      width: 100%;
    }

    .resume-banner {
      background: #2a3a5e;
      border: 1px solid #4a5d8e;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      color: #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .resume-banner button {
      background: transparent;
      border: 1px solid #aaa;
      color: #ccc;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .resume-banner button:hover { background: rgba(255,255,255,0.05); }

    code {
      background: #0f3460;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<h1>🏆 MAL Anime Ranker</h1>
<p class="subtitle">Swiss-style tournament. Head-to-head matches over your completed anime to find your top 9.</p>

<!-- ─── Setup screen ───────────────────────────────────────── -->
<div class="card" id="setupCard">
  <div id="resumeBanner" class="resume-banner" style="display:none;">
    <span id="resumeText"></span>
    <div style="display:flex;gap:6px;">
      <button onclick="resumeTournament()">Resume</button>
      <button onclick="clearSavedTournament()">Discard</button>
    </div>
  </div>

  <div class="field">
    <label>MyAnimeList Username
      <span class="filter-note">(local proxy must be running: <code>python3 mal_proxy.py</code>)</span></label>
    <input type="text" id="username" placeholder="e.g. Darkestcraft" />
  </div>

  <div class="field">
    <label>Min Score <span class="filter-note">(only include anime you rated this score or higher; 0 = include unscored too)</span></label>
    <div class="slider-row">
      <input type="range" id="scoreSlider" min="0" max="10" value="7" step="1" oninput="updateScoreLabel()" />
      <div class="slider-val" id="scoreVal">≥ 7</div>
    </div>
  </div>

  <div class="field">
    <label>Swiss Rounds <span class="filter-note">(more rounds = more accurate ranking, but more clicks)</span></label>
    <div class="slider-row">
      <input type="range" id="roundsSlider" min="3" max="9" value="6" step="1" oninput="updateRoundsLabel()" />
      <div class="slider-val" id="roundsVal">6</div>
    </div>
  </div>

  <button class="btn" onclick="startTournament()">Start Tournament</button>
</div>

<!-- ─── Match-up screen ─────────────────────────────────────── -->
<div class="card" id="matchCard" style="display:none;">
  <div class="match-header">
    <div class="round-label" id="roundLabel">Round 1 of 6</div>
    <div class="match-progress" id="matchProgress">Match 1 of 12</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%;"></div></div>
  </div>

  <div class="versus" id="versus">
    <!-- fighters injected here -->
  </div>

  <div class="row" style="margin-top:18px;">
    <button class="btn btn-ghost" onclick="abortTournament()" style="flex:1;">Abort</button>
  </div>
</div>

<!-- ─── Results screen ─────────────────────────────────────── -->
<div class="card" id="resultsCard" style="display:none;">
  <div style="text-align:center;margin-bottom:20px;">
    <h2 style="color:#ffb74d;margin-bottom:6px;">Top 9 Standings</h2>
    <div style="color:#aaa;font-size:0.85rem;" id="resultsSubtitle"></div>
  </div>

  <div class="standings" id="standings"></div>

  <div class="row" style="margin-top:20px;">
    <button class="btn" onclick="newTournament()" style="flex:1;">New Tournament</button>
  </div>
</div>

<div id="error-msg"></div>

<div class="spinner" id="spinner">⏳ Loading…</div>

<script>
  // ──────────────────────────────────────────────────────────────
  // State
  // ──────────────────────────────────────────────────────────────
  const PROXY_URL = 'http://localhost:8765';
  const STORAGE_KEY = 'mal_ranker_state_v1';

  /**
   * tournament = {
   *   username, totalRounds, currentRound, currentMatchIdx,
   *   players: [{id, title, image, type, episodes, userScore, wins, losses, opponents:[ids]}],
   *   rounds: [
   *     [{a: id, b: id|null, winner: id|null}, ...]   // round 1
   *     ...
   *   ]
   * }
   */
  let tournament = null;

  // ──────────────────────────────────────────────────────────────
  // Setup screen
  // ──────────────────────────────────────────────────────────────
  function updateScoreLabel() {
    const v = document.getElementById('scoreSlider').value;
    document.getElementById('scoreVal').textContent = v === '0' ? 'Any' : `≥ ${v}`;
  }
  function updateRoundsLabel() {
    document.getElementById('roundsVal').textContent = document.getElementById('roundsSlider').value;
  }

  // Check for saved tournament on load
  (function checkResume() {
    const saved = loadSavedTournament();
    if (saved) {
      const banner = document.getElementById('resumeBanner');
      const completed = saved.rounds.slice(0, saved.currentRound).reduce((s, r) => s + r.length, 0)
                      + saved.currentMatchIdx;
      const total = saved.rounds.reduce((s, r) => s + r.length, 0);
      document.getElementById('resumeText').textContent =
        `In-progress tournament for "${saved.username}" — ${completed}/${total} matches done.`;
      banner.style.display = 'flex';
    }
  })();

  function loadSavedTournament() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (_) { return null; }
  }
  function saveTournament() {
    if (tournament) localStorage.setItem(STORAGE_KEY, JSON.stringify(tournament));
  }
  function clearSavedTournament() {
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById('resumeBanner').style.display = 'none';
  }

  function resumeTournament() {
    tournament = loadSavedTournament();
    if (!tournament) return;
    showMatchScreen();
    renderCurrentMatch();
  }

  // ──────────────────────────────────────────────────────────────
  // Start tournament: fetch list, build players, generate round 1
  // ──────────────────────────────────────────────────────────────
  async function startTournament() {
    const username = document.getElementById('username').value.trim();
    if (!username) { showError('Enter a username first.'); return; }

    const minScore    = parseInt(document.getElementById('scoreSlider').value);
    const totalRounds = parseInt(document.getElementById('roundsSlider').value);

    clearError();
    setSpinner('⏳ Fetching your completed list…');

    try {
      const url = `${PROXY_URL}/completed/${encodeURIComponent(username)}`;
      let res;
      try {
        res = await fetch(url);
      } catch (_) {
        throw new Error('Cannot reach proxy. Run: python3 mal_proxy.py');
      }
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || `Proxy error ${res.status}.`);

      // Filter by user score
      const eligible = (json.anime || []).filter(a => {
        if (minScore === 0) return true;
        return (a.score || 0) >= minScore;
      });

      if (eligible.length < 4) {
        throw new Error(`Only ${eligible.length} anime match the score filter. Need at least 4.`);
      }

      // Build players
      const players = eligible.map(a => ({
        id:        a.id,
        title:     a.title,
        image:     a.image || '',
        type:      a.type,
        episodes:  a.episodes,
        userScore: a.score || 0,
        wins:      0,
        losses:    0,
        byes:      0,
        opponents: [],
      }));

      tournament = {
        username,
        minScore,
        totalRounds,
        currentRound:    0,
        currentMatchIdx: 0,
        players,
        rounds:          [],
      };

      // Generate first round
      tournament.rounds.push(buildRound(tournament));
      saveTournament();
      clearSavedTournament(); // remove old "in-progress" banner state
      saveTournament();        // re-save the new one

      setSpinner('');
      showMatchScreen();
      renderCurrentMatch();

    } catch (e) {
      setSpinner('');
      showError(e.message);
    }
  }

  // ──────────────────────────────────────────────────────────────
  // Swiss pairing
  // ──────────────────────────────────────────────────────────────
  function buildRound(t) {
    // Sort players by score (wins desc, then random for tie-breaking)
    // Skip rematches: track opponents already faced.
    const sorted = [...t.players].sort((p, q) => {
      if (q.wins !== p.wins) return q.wins - p.wins;
      return Math.random() - 0.5; // random within score group
    });

    const matches = [];
    const used = new Set();

    for (let i = 0; i < sorted.length; i++) {
      if (used.has(sorted[i].id)) continue;
      const a = sorted[i];

      // Find next unpaired player a hasn't played yet
      let bIdx = -1;
      for (let j = i + 1; j < sorted.length; j++) {
        if (used.has(sorted[j].id)) continue;
        if (a.opponents.includes(sorted[j].id)) continue;
        bIdx = j;
        break;
      }
      // If everyone left is a rematch, just take the next one
      if (bIdx === -1) {
        for (let j = i + 1; j < sorted.length; j++) {
          if (!used.has(sorted[j].id)) { bIdx = j; break; }
        }
      }

      if (bIdx === -1) {
        // Odd one out — bye
        matches.push({ a: a.id, b: null, winner: a.id });
        used.add(a.id);
      } else {
        matches.push({ a: a.id, b: sorted[bIdx].id, winner: null });
        used.add(a.id);
        used.add(sorted[bIdx].id);
      }
    }

    return matches;
  }

  // ──────────────────────────────────────────────────────────────
  // Match-up rendering
  // ──────────────────────────────────────────────────────────────
  function showMatchScreen() {
    document.getElementById('setupCard').style.display = 'none';
    document.getElementById('matchCard').style.display = '';
    document.getElementById('resultsCard').style.display = 'none';
  }
  function showResultsScreen() {
    document.getElementById('setupCard').style.display = 'none';
    document.getElementById('matchCard').style.display = 'none';
    document.getElementById('resultsCard').style.display = '';
  }
  function showSetupScreen() {
    document.getElementById('setupCard').style.display = '';
    document.getElementById('matchCard').style.display = 'none';
    document.getElementById('resultsCard').style.display = 'none';
  }

  function getPlayer(id) {
    return tournament.players.find(p => p.id === id);
  }

  function renderCurrentMatch() {
    const t = tournament;

    // Skip past byes (auto-resolved)
    while (t.currentRound < t.rounds.length) {
      const round = t.rounds[t.currentRound];
      while (t.currentMatchIdx < round.length && round[t.currentMatchIdx].b === null) {
        // bye — already has winner set; record it
        const m = round[t.currentMatchIdx];
        const w = getPlayer(m.winner);
        if (w && !w._byeCounted) {
          w.wins  += 1;
          w.byes  += 1;
          w._byeCounted = true;
        }
        t.currentMatchIdx += 1;
      }
      if (t.currentMatchIdx >= round.length) {
        // Round done. Generate next or finish.
        t.currentRound += 1;
        t.currentMatchIdx = 0;
        if (t.currentRound < t.totalRounds) {
          t.rounds.push(buildRound(t));
        } else {
          saveTournament();
          finishTournament();
          return;
        }
      } else {
        break;
      }
    }

    saveTournament();

    const round = t.rounds[t.currentRound];
    const match = round[t.currentMatchIdx];

    // Header
    const totalMatches = round.length;
    document.getElementById('roundLabel').textContent =
      `Round ${t.currentRound + 1} of ${t.totalRounds}`;
    document.getElementById('matchProgress').textContent =
      `Match ${t.currentMatchIdx + 1} of ${totalMatches}`;

    const overallDone  = t.rounds.slice(0, t.currentRound).reduce((s, r) => s + r.length, 0)
                       + t.currentMatchIdx;
    const overallTotal = t.rounds.reduce((s, r) => s + r.length, 0)
                       + Math.max(0, t.totalRounds - t.rounds.length) * (t.players.length / 2);
    document.getElementById('progressFill').style.width =
      `${Math.min(100, (overallDone / overallTotal) * 100)}%`;

    // Fighters
    const a = getPlayer(match.a);
    const b = getPlayer(match.b);
    const versus = document.getElementById('versus');
    versus.innerHTML = `
      ${renderFighter(a)}
      <div class="vs">VS</div>
      ${renderFighter(b)}
    `;

    // Wire clicks
    versus.children[0].onclick = () => pickWinner(a.id);
    versus.children[2].onclick = () => pickWinner(b.id);
  }

  function renderFighter(p) {
    const epLabel = p.episodes === 0 ? '? eps' : `${p.episodes} ep${p.episodes !== 1 ? 's' : ''}`;
    return `
      <div class="fighter">
        <img src="${escapeAttr(p.image)}" alt="" onerror="this.style.visibility='hidden'"/>
        <div class="fighter-title">${escapeHtml(p.title)}</div>
        <div class="fighter-meta">${escapeHtml(p.type)} · ${epLabel} · ${p.wins}W ${p.losses}L</div>
      </div>
    `;
  }

  function pickWinner(winnerId) {
    const t = tournament;
    const round = t.rounds[t.currentRound];
    const match = round[t.currentMatchIdx];

    const loserId = match.a === winnerId ? match.b : match.a;
    match.winner = winnerId;

    const winner = getPlayer(winnerId);
    const loser  = getPlayer(loserId);
    winner.wins   += 1;
    loser.losses  += 1;
    winner.opponents.push(loserId);
    loser.opponents.push(winnerId);

    t.currentMatchIdx += 1;
    saveTournament();
    renderCurrentMatch();
  }

  function abortTournament() {
    if (!confirm('Abort this tournament? Progress will be lost.')) return;
    clearSavedTournament();
    tournament = null;
    showSetupScreen();
  }

  // ──────────────────────────────────────────────────────────────
  // Final standings
  // ──────────────────────────────────────────────────────────────
  function finishTournament() {
    const t = tournament;

    // Buchholz: sum of opponents' final wins (a tiebreaker measuring strength of schedule)
    for (const p of t.players) {
      p.buchholz = p.opponents.reduce((sum, oid) => {
        const o = getPlayer(oid);
        return sum + (o ? o.wins : 0);
      }, 0);
    }

    const ranked = [...t.players].sort((a, b) => {
      if (b.wins      !== a.wins)      return b.wins      - a.wins;
      if (b.buchholz  !== a.buchholz)  return b.buchholz  - a.buchholz;
      if (b.userScore !== a.userScore) return b.userScore - a.userScore;
      return a.title.localeCompare(b.title);
    });

    const top = ranked.slice(0, 9);

    document.getElementById('resultsSubtitle').textContent =
      `${t.players.length} contenders · ${t.totalRounds} Swiss rounds · ranked by wins, then strength of schedule`;

    const standings = document.getElementById('standings');
    standings.innerHTML = top.map((p, i) => {
      const rank = i + 1;
      const cls  = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
      const epLabel = p.episodes === 0 ? '? eps' : `${p.episodes} ep${p.episodes !== 1 ? 's' : ''}`;
      const yourScore = p.userScore > 0 ? ` · your score ${p.userScore}` : '';
      return `
        <div class="stand-row ${cls}">
          <div class="stand-rank">${rank}</div>
          <img class="stand-img" src="${escapeAttr(p.image)}" onerror="this.style.visibility='hidden'"/>
          <div class="stand-info">
            <div class="stand-title">
              <a href="https://myanimelist.net/anime/${p.id}/" target="_blank" style="color:#fff;text-decoration:none;">
                ${escapeHtml(p.title)}
              </a>
            </div>
            <div class="stand-meta">${escapeHtml(p.type)} · ${epLabel}${yourScore}</div>
          </div>
          <div class="stand-record">${p.wins}W ${p.losses}L${p.byes ? ` · ${p.byes}b` : ''}</div>
        </div>
      `;
    }).join('');

    showResultsScreen();
    // Keep the result saved until user starts a new tournament
  }

  function newTournament() {
    clearSavedTournament();
    tournament = null;
    showSetupScreen();
  }

  // ──────────────────────────────────────────────────────────────
  // Helpers
  // ──────────────────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
  }
  function clearError() {
    document.getElementById('error-msg').style.display = 'none';
  }
  function setSpinner(text) {
    const sp = document.getElementById('spinner');
    if (text) {
      sp.textContent = text;
      sp.style.display = 'block';
    } else {
      sp.style.display = 'none';
    }
  }
</script>
</body>
</html>
